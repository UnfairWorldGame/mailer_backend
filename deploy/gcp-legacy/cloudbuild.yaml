# Build + push + deploy MAILIQ API to Cloud Run
# Run from backend/:  gcloud builds submit --config cloudbuild.yaml .
#
# Required: Artifact Registry repo "mailiq" in $_REGION (see scripts/gcp-first-time-setup.ps1)

substitutions:
  _REGION: asia-south1
  _SERVICE: mailiq-api
  _AR_REPO: mailiq
  _FRONTEND_URL: https://mailc.netlify.app

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/mailer-api:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/mailer-api:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/mailer-api

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/mailer-api:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --timeout=3600
      - --min-instances=1
      - --max-instances=10
      - --set-env-vars=NODE_ENV=production,PORT=8080,HOST=0.0.0.0
      - --set-secrets=MONGODB_URI=mailiq-mongodb-uri:latest,JWT_SECRET=mailiq-jwt-secret:latest,GEMINI_API_KEY=mailiq-gemini-api-key:latest,PASSWORD_RESET_SMTP_APP_PASSWORD=mailiq-smtp-app-password:latest
      - --update-env-vars=FRONTEND_URL=${_FRONTEND_URL},PASSWORD_RESET_SMTP_EMAIL=mailiq.office@gmail.com,PASSWORD_RESET_FROM_NAME=MAILIQ,CONTACT_INBOX_EMAIL=mailiq.office@gmail.com,ADMIN_EMAILS=m87.krishna@gmail.com

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/mailer-api:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/mailer-api:latest

options:
  logging: CLOUD_LOGGING_ONLY
